# Wrangler configuration for Cloudflare Workers
# Replace placeholders (account_id, route, zone_id) before deploying.

name = "jebeni-chat"
main = "src/server/index.ts"
compatibility_date = "2025-10-08"
# Set your account id here (required for publishing to your account)
# account_id = "your-account-id"

# Build command used by wrangler (keeps existing esbuild command)
[build]
  command = "esbuild src/client/index.tsx --bundle --splitting --format=esm --platform=browser --outdir=public/dist"

# Assets (static site) settings
[site]
  bucket = "./public"
  entry-point = "workers-site"

# Durable Object bindings
[durable_objects]
  bindings = [
    { name = "Chat", class_name = "Chat" }
  ]

# Worker-level (non-secret) environment variables
[vars]
# PUBLIC values (safe to be visible) — the client bundle may need these at build time
VITE_SUPABASE_URL = "https://ogyilwjxojwfngzocvpg.supabase.co"

# NOTE: Do NOT put secret keys here. Use `wrangler secret put` for secrets.
# Example to set the anonymous Supabase key (recommended):
#   wrangler secret put VITE_SUPABASE_ANON_KEY
# Then deploy normally: `wrangler publish` or `npm run deploy`.

# Optional: per-environment overrides
[env.production]
# account_id = "your-production-account-id"
# route = "example.com/*"
# zone_id = "your-zone-id"

# Production-level vars (non-secret). Secrets still go via `wrangler secret put --env production`
[env.production.vars]
